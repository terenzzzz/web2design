<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Web2Figma</title>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      margin-top: 8px;
    }
    button:hover {
      background-color: #0D8DE3;
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 16px;
      padding: 8px;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    #status.success {
      background-color: #E7F6ED;
      color: #208637;
      font-weight: 600;
    }
    #status.error {
      background-color: #FFF0F0;
      color: #EB5757;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="control-group">
    <label for="viewport-width">Viewport Width (px)</label>
    <input type="number" id="viewport-width" placeholder="Leave empty for current">
    <div class="hint">Recommended: 1440 for Desktop</div>
  </div>
  <div class="control-group">
    <label for="capture-delay">Capture Delay (ms)</label>
    <input type="number" id="capture-delay" placeholder="e.g., 1000">
    <div class="hint">Extra wait for lazy images</div>
  </div>
  <button id="capture-btn">Capture Page</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
